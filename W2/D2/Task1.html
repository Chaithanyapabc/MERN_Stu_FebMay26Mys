<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification center card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white w-96 p-6 rounded-xl shadow">

  <div class="flex justify-between items-center mb-4">
    <h2 class="font-bold text-lg">Notification Center</h2>
    <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm">3 New</span>
  </div>

  <div class="bg-red-200 border-l-4 border-red-500 p-3 rounded mb-3">
    <b>Action required</b>
    <p class="text-sm">Your last payment metthod is failed.Please update your payment to avoid security</p>
  </div>

  <div class="bg-yellow-200 border-l-4 border-red-500 p-3 rounded mb-3">
    <b>Maintenence notice</b>
    <p class="text-sm">The System undergoes maintenence to night.some feature maintenence unavailable</p>
  </div>
   <button class="bg-blue-600 text-white px-4 py-2 rounded mr-2">view all</button>
    <button class="border border-gray-400 text-gray-700 px-4 py-2 rounded">dismiss</button>
</div>

</body>
</html>
